name: Update CHANGELOG and CONTRIBUTORS

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  regenerate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # required: script needs full git log, not a shallow clone

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Regenerate CHANGELOG.md and CONTRIBUTORS.md
        run: python3 scripts/generate_docs.py

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md CONTRIBUTORS.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "docs: auto-update CHANGELOG.md and CONTRIBUTORS.md [skip ci]"
            git push
          fi